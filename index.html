<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="lstyle.css">
    <title>LimiPlake Apps - Login</title>
  </head>
  <body><div id="loginbox">
    <h1>Apps - Login:</h1>
    <p id="prompt">Enter PIN and passcode:</p>
    <div id="fields">
      <div class="row">
        <p class="tellr">PIN:</p>
        <input type="number" id="pinf">
      </div>
      <div class="row">
        <p class="tellr">Passcode:</p>
        <input type="password" id="passf">
      </div>
        <button id="loginactivate">Sign In</button>
      </div>

      <div id="errfld"></div>
    </div>
    <script src="login.js"></script>
  </body>
</html>
